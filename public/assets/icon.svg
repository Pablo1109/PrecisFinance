<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Precis Finance - Titanium Edition">
  <defs>
    <linearGradient id="titanium" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#27272a"/>
      <stop offset="50%" stop-color="#52525b"/>
      <stop offset="100%" stop-color="#a1a1aa"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
  </defs>

  <!-- Premium Smooth Rounded Box -->
  <rect width="128" height="128" rx="36" fill="url(#bgGrad)" stroke="#27272a" stroke-width="1"/>

  <!-- Minimalist Geometric Finance Helix (Abstract P / Infinity Flow) -->
  <g transform="translate(16, 16)">
    <!-- Back Loop -->
    <path d="M 48 24 C 28 24, 20 40, 20 48 C 20 56, 28 72, 48 72 C 68 72, 76 56, 76 48 C 76 40, 68 24, 48 24 Z" fill="none" stroke="url(#titanium)" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
    <!-- Front Flow (Growth Trend + Flow Loop) -->
    <path d="M 24 64 L 44 44 L 56 52 L 76 28" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="76" cy="28" r="6" fill="#a1a1aa"/>
  </g>
</svg>
