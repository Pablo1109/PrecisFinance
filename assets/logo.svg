<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" role="img" aria-label="Precis Finance - Corinthians Edition">
  <!-- Circular Corinthians Badge -->
  <g transform="translate(4,4)">
    <circle cx="24" cy="24" r="23" fill="#09090b" stroke="#ffffff" stroke-width="2"/>
    <circle cx="24" cy="24" r="19" fill="#18181b" stroke="#3f3f46" stroke-width="0.5"/>

    <!-- Crossed Oars (Red) -->
    <g stroke="#E30613" stroke-width="2" stroke-linecap="round" fill="none">
      <line x1="10" y1="38" x2="38" y2="10" />
      <path d="M 36 8 L 40 12 L 42 10 L 38 6 Z" fill="#E30613" stroke="none" />
      <line x1="38" y1="38" x2="10" y2="10" />
      <path d="M 12 8 L 8 12 L 6 10 L 10 6 Z" fill="#E30613" stroke="none" />
    </g>

    <!-- Anchor (White/Gold) -->
    <g fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="24" cy="15" r="3" stroke="#D4AF37" stroke-width="1" />
      <line x1="24" y1="18" x2="24" y2="34" stroke="#ffffff" stroke-width="2" />
      <line x1="18" y1="22" x2="30" y2="22" />
      <path d="M 14 28 C 17 35, 31 35, 34 28" stroke="#ffffff" stroke-width="2" />
    </g>

    <!-- Financial Trend Line (Gold) -->
    <path d="M 12 32 L 20 24 L 27 29 L 36 17" fill="none" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Corinthians Themed Wordmark -->
  <g font-family="Montserrat, Unbounded, system-ui, sans-serif" fill="#ffffff">
    <text x="64" y="29" font-size="19" font-weight="900" letter-spacing="-0.5" fill="#ffffff">PRECIS</text>
    <text x="144" y="29" font-size="19" font-weight="400" letter-spacing="0" fill="#D4AF37">FINANCE</text>
    <text x="64" y="44" font-size="8.5" font-weight="700" letter-spacing="2" fill="#E30613">CORINTHIANS EDITION</text>
  </g>
</svg>
